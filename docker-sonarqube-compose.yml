# =============================================================================
# SonarQube Docker Compose
# =============================================================================
# Spins up a SonarQube Community Edition instance backed by PostgreSQL.
#
# HOW TO RUN:
#   Start:
#     docker compose -f docker-sonarcube-compose.yml up -d
#
#   Stop:
#     docker compose -f docker-sonarcube-compose.yml down
#
#   Stop and remove volumes (full reset):
#     docker compose -f docker-sonarcube-compose.yml down -v
#
#   View logs:
#     docker compose -f docker-sonarcube-compose.yml logs -f
#
# ACCESS:
#   SonarQube UI: http://localhost:9000
#   Default credentials: admin / admin (you will be prompted to change on first login)
#
# NOTE:
#   SonarQube requires vm.max_map_count >= 524288 on Linux hosts.
#   Run: sudo sysctl -w vm.max_map_count=524288
# =============================================================================

name: aiassistsonarcube

services:

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"             # Expose SonarQube web UI on host port 9000
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar   # Connect to the postgres service below
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data               # Analysis data and configuration
      - sonarqube_logs:/opt/sonarqube/logs               # Application logs
      - sonarqube_extensions:/opt/sonarqube/extensions   # Plugins and extensions
    depends_on:
      - db                      # Ensure the database is started before SonarQube

  db:
    image: postgres:15
    container_name: sonarqube_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar       # Database name expected by SonarQube
    volumes:
      - postgresql_data:/var/lib/postgresql/data         # Persist database across restarts

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgresql_data: